      value: application/json
  body:
    type: json
    data: |-
      {
        "filePath": "flightdrift-frontend/package.json"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
