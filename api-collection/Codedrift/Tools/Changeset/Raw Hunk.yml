info:
  name: Raw Hunk
  type: http
  seq: 3

http:
  method: POST
  url: "{{BASE_URL}}/tools/changeset/raw-hunk"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "filePath": "flightdrift-frontend/package.json"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
