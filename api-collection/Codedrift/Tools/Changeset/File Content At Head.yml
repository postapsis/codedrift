info:
    name: File Content At Head
    type: http
    seq: 5

http:
    method: POST
    url: "{{BASE_URL}}/tools/changeset/file-content-at-head"
    headers:
        - name: Content-Type
          value: application/json
    body:
        type: json
        data: |-
            {
              "filePath": "flightdrift-frontend/package.json"
            }
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5
