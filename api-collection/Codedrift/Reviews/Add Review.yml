info:
  name: Add Review
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/addReview"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "My review",
        "repositories": [
          {
            "repositoryId": "",
            "baseRef": "main",
            "headRef": "feature/integrating-auth"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
